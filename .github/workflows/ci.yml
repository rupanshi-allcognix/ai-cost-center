name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_REGISTRY: ${{ secrets.DOCKER_USERNAME }}

jobs:
  validate-frontend:
    name: Validate Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ai-cost-center-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "./ai-cost-center-frontend/package-lock.json"
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  validate-backend:
    name: Validate Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ai-cost-center-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "./ai-cost-center-backend/requirements.txt"
      - run: pip install -r requirements.txt
      - run: ruff check .
      - run: ruff format --check .
      - run: python -m pytest -v

  docker:
    name: Build & Push Docker Images
    if: github.ref == 'refs/heads/main'
    needs: [validate-frontend, validate-backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./ai-cost-center-backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ai-cost-center-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/ai-cost-center-backend:${{ github.sha }}
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./ai-cost-center-frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ai-cost-center-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/ai-cost-center-frontend:${{ github.sha }}
      - name: Build and push deployment
        uses: docker/build-push-action@v5
        with:
          context: ./ai-cost-center-deployment
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ai-cost-center-deployment:latest
            ${{ secrets.DOCKER_USERNAME }}/ai-cost-center-deployment:${{ github.sha }}
