name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ai-cost-center-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "./ai-cost-center-frontend/package-lock.json"
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

  docker:
    name: Build & Push Docker Images
    if: github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./ai-cost-center-backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ai-cost-center-backend:latest
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./ai-cost-center-frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ai-cost-center-frontend:latest
      - name: Build and push deployment
        uses: docker/build-push-action@v5
        with:
          context: ./ai-cost-center-deployment
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ai-cost-center-deployment:latest
