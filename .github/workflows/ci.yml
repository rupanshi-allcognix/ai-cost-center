name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_REGISTRY: ${{ secrets.DOCKER_USERNAME }}

jobs:
  validate-backend:
    name: Validate Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ai-cost-center-backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "./ai-cost-center-backend/requirements.txt"
      - run: pip install -r requirements.txt
      - run: ruff check .
      - run: ruff format --check .
      - run: python -m pytest -v

  docker:
    name: Build & Push Docker Images
    if: github.ref == 'refs/heads/main'
    needs: [validate-backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Clear Docker build cache
        run: docker builder prune --all --force
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./ai-cost-center-backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ai-cost-center-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/ai-cost-center-backend:${{ github.sha }}
      - name: Build and push nginx
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./ai-cost-center-deployment/Dockerfile.nginx
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ai-cost-center-nginx:latest
            ${{ secrets.DOCKER_USERNAME }}/ai-cost-center-nginx:${{ github.sha }}
