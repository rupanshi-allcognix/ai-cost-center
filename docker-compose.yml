services:
  ai-cost-center-backend:
    build:
      context: ./ai-cost-center-backend/backend
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      - ai-cost-center-backend

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    env_file: .env
    depends_on:
      nginx:
        condition: service_healthy
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  ai-cost-center-frontend:
    build:
      context: ./ai-cost-center-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
