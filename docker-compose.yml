version: "3.9"

services:
  ai-cost-center-backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    image: allcognix/infra:ai-cost-center-backend-${IMAGE_VERSION}
    ports:
      - "8000:8000"
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      - ai-cost-center-backend

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      nginx:
        condition: service_healthy
    env_file:
      - ./.env
    command:
      - tunnel
      - --no-autoupdate
      - --protocol
      - http2
      - run
