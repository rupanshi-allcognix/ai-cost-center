version: "3.9"

services:
  ai-cost-center-backend:
    build: ./ai-cost-center-backend
    build:
      context: .
      dockerfile: Dockerfile
    image: allcognix/infra:ai-cost-center-backend-${IMAGE_VERSION}
    ports:
      - "8000:8000"
    env_file: .env
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      - ai-cost-center-backend